[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
board_build.filesystem = littlefs
upload_port = COM4
upload_speed = 460800
monitor_port = COM4
monitor_speed = 115200

; Optimizar código para la interfaz gráfica
build_flags =
    -O3
    -D CONFIG_ESP_TASK_WDT_TIMEOUT_S=10
    -D USER_SETUP_LOADED=1
    -D ILI9341_2_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D TFT_INVERSION_ON
    -D SPI_FREQUENCY=24000000
    -D SPI_READ_FREQUENCY=10000000
    -D SPI_TOUCH_FREQUENCY=2500000
    -D TOUCH_CS=33
    -D LV_CONF_INCLUDE_SIMPLE
    -I src/
    -I include/

lib_deps =
    lvgl/lvgl@^8.3.11
    bodmer/TFT_eSPI@^2.5.31
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git#v1.4
